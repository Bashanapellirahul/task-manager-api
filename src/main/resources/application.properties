spring.application.name=task-manger-api
# application.properties

# Your database connection
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager_db
spring.datasource.username=rahul
spring.datasource.password=Mynewpassword27
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
# 'update' means: auto-create tables from your Java classes (great for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Your app runs on port 8080
server.port=8080

# A secret key for making JWT tokens (use a long random string)
app.jwt.secret=myNewSecretKey98765432101234567890FEDCABABCDEF
app.jwt.expiration=86400000